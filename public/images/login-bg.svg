<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Atelier de confection textile">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1028"/>
      <stop offset="45%" stop-color="#4a1942"/>
      <stop offset="100%" stop-color="#6b2145"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d1736"/>
      <stop offset="100%" stop-color="#1f0a1c"/>
    </linearGradient>
    <linearGradient id="light" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#be185d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fabric1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="fabric2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="fabric3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <pattern id="weave" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M0 12h24M12 0v24" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M0 0l24 24M24 0L0 24" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.8"/>
    </pattern>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#wall)"/>
  <rect width="1920" height="1080" fill="url(#weave)"/>
  <rect width="1920" height="1080" fill="url(#light)"/>

  <ellipse cx="960" cy="180" rx="520" ry="220" fill="#f9a8d4" opacity="0.12" filter="url(#softBlur)"/>

  <rect x="0" y="760" width="1920" height="320" fill="url(#floor)"/>
  <rect x="0" y="748" width="1920" height="18" fill="#f9a8d4" opacity="0.18"/>

  <!-- Étagčres et rouleaux de tissu -->
  <g opacity="0.92">
    <rect x="120" y="220" width="420" height="18" rx="4" fill="#5b1a4e"/>
    <rect x="140" y="150" width="78" height="70" rx="10" fill="url(#fabric1)"/>
    <rect x="235" y="135" width="92" height="85" rx="12" fill="url(#fabric2)"/>
    <rect x="345" y="158" width="70" height="62" rx="10" fill="url(#fabric3)"/>
    <ellipse cx="179" cy="220" rx="39" ry="10" fill="#2d1028" opacity="0.45"/>
    <ellipse cx="281" cy="220" rx="46" ry="11" fill="#2d1028" opacity="0.45"/>
    <ellipse cx="380" cy="220" rx="35" ry="9" fill="#2d1028" opacity="0.45"/>

    <rect x="1380" y="240" width="420" height="18" rx="4" fill="#5b1a4e"/>
    <rect x="1400" y="168" width="88" height="72" rx="12" fill="url(#fabric3)"/>
    <rect x="1505" y="150" width="96" height="90" rx="12" fill="url(#fabric1)"/>
    <rect x="1620" y="175" width="74" height="65" rx="10" fill="url(#fabric2)"/>
    <ellipse cx="1444" cy="240" rx="44" ry="10" fill="#2d1028" opacity="0.45"/>
    <ellipse cx="1553" cy="240" rx="48" ry="11" fill="#2d1028" opacity="0.45"/>
    <ellipse cx="1657" cy="240" rx="37" ry="9" fill="#2d1028" opacity="0.45"/>
  </g>

  <!-- Mannequin -->
  <g transform="translate(250 290)" opacity="0.88">
    <ellipse cx="70" cy="28" rx="34" ry="38" fill="#fbcfe8"/>
    <path d="M36 66 C20 120 18 220 24 360 L116 360 C122 220 120 120 104 66 Z" fill="#db2777"/>
    <path d="M24 360 L8 470 L44 470 L52 360 M116 360 L124 470 L160 470 L136 360" fill="#9d174d"/>
    <rect x="52" y="118" width="36" height="8" rx="4" fill="#f9a8d4" opacity="0.7"/>
    <rect x="48" y="198" width="44" height="8" rx="4" fill="#f9a8d4" opacity="0.55"/>
  </g>

  <!-- Machine ŕ coudre -->
  <g transform="translate(1180 500)" opacity="0.9">
    <rect x="0" y="120" width="360" height="150" rx="18" fill="#2d1028"/>
    <rect x="24" y="88" width="312" height="56" rx="12" fill="#4a1942"/>
    <rect x="70" y="42" width="220" height="52" rx="10" fill="#6b2145"/>
    <circle cx="180" cy="66" r="18" fill="#f9a8d4"/>
    <path d="M180 66 L220 20 L250 66 Z" fill="#e2e8f0"/>
    <rect x="120" y="150" width="120" height="18" rx="6" fill="#831843"/>
    <path d="M40 270 Q180 300 320 270 L320 290 Q180 320 40 290 Z" fill="#1f0a1c"/>
    <path d="M300 150 C340 180 360 220 350 280" fill="none" stroke="#fbcfe8" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Table de coupe -->
  <g transform="translate(520 560)" opacity="0.9">
    <rect x="0" y="120" width="520" height="28" rx="6" fill="#5b1a4e"/>
    <rect x="30" y="148" width="18" height="150" fill="#3d1736"/>
    <rect x="472" y="148" width="18" height="150" fill="#3d1736"/>
    <rect x="40" y="70" width="440" height="52" rx="8" fill="url(#fabric2)"/>
    <path d="M60 95 H460" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="10 8"/>
    <path d="M80 70 L120 122" stroke="#f9a8d4" stroke-width="3"/>
    <path d="M460 70 L420 122" stroke="#f9a8d4" stroke-width="3"/>
    <rect x="210" y="40" width="100" height="30" rx="6" fill="#e2e8f0" opacity="0.9"/>
    <circle cx="260" cy="28" r="10" fill="#db2777"/>
  </g>

  <!-- Bobines de fil -->
  <g opacity="0.95">
    <ellipse cx="980" cy="690" rx="42" ry="14" fill="#2d1028" opacity="0.5"/>
    <rect x="948" y="610" width="64" height="80" rx="10" fill="#db2777"/>
    <rect x="958" y="620" width="44" height="12" rx="4" fill="#fbcfe8" opacity="0.8"/>
    <rect x="958" y="642" width="44" height="12" rx="4" fill="#fbcfe8" opacity="0.65"/>
    <rect x="958" y="664" width="44" height="12" rx="4" fill="#fbcfe8" opacity="0.5"/>

    <ellipse cx="1120" cy="720" rx="36" ry="12" fill="#2d1028" opacity="0.5"/>
    <rect x="1094" y="650" width="52" height="70" rx="8" fill="#831843"/>
    <rect x="1102" y="658" width="36" height="10" rx="3" fill="#f9a8d4" opacity="0.75"/>
    <rect x="1102" y="676" width="36" height="10" rx="3" fill="#f9a8d4" opacity="0.6"/>

    <ellipse cx="1260" cy="700" rx="38" ry="12" fill="#2d1028" opacity="0.5"/>
    <rect x="1234" y="630" width="52" height="70" rx="8" fill="#be185d"/>
    <rect x="1242" y="638" width="36" height="10" rx="3" fill="#fdf2f8" opacity="0.75"/>
    <rect x="1242" y="656" width="36" height="10" rx="3" fill="#fdf2f8" opacity="0.6"/>
  </g>

  <!-- Cintre et vętement -->
  <g transform="translate(1540 360)" opacity="0.85">
    <path d="M40 0 C70 0 90 18 90 40 C90 58 78 72 60 78 L60 92 L20 92 L20 78 C2 72 -10 58 -10 40 C-10 18 10 0 40 0 Z" fill="#e2e8f0"/>
    <path d="M20 92 L-20 250 L100 250 L60 92 Z" fill="#9d174d"/>
    <path d="M0 140 Q40 120 80 140" fill="none" stroke="#fbcfe8" stroke-width="3"/>
  </g>

  <!-- Fil décoratif -->
  <path d="M0 820 C240 760 420 900 700 840 C980 780 1180 920 1450 860 C1680 810 1820 870 1920 820" fill="none" stroke="#f9a8d4" stroke-opacity="0.25" stroke-width="6"/>
  <path d="M0 860 C300 800 520 940 860 880 C1200 820 1500 950 1920 870" fill="none" stroke="#db2777" stroke-opacity="0.18" stroke-width="4"/>

  <rect width="1920" height="1080" fill="#1f0a1c" opacity="0.22"/>
</svg>
